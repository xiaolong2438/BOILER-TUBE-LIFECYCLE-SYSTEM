name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "炉管全生命周期管理系统.html"
      - "functions/**"
      - "migrations/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "炉管全生命周期管理系统.html" dist/index.html

      - name: Check Cloudflare secrets
        id: cloudflare
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "::warning::Cloudflare deployment skipped. Configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets, then rerun this workflow."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Cloudflare config and D1
        if: steps.cloudflare.outputs.ready == 'true'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          DB_NAME="boiler_tube_lifecycle_system"
          npx --yes wrangler@latest d1 list --json > d1-list.json
          D1_DATABASE_ID="$(python scripts/resolve_d1_id.py d1-list.json)"
          if [[ -z "$D1_DATABASE_ID" ]]; then
            npx --yes wrangler@latest d1 create "$DB_NAME" --json > d1-create.json
            D1_DATABASE_ID="$(python scripts/resolve_d1_id.py d1-create.json)"
          fi
          if [[ -z "$D1_DATABASE_ID" ]]; then
            echo "Unable to resolve D1 database id."
            exit 1
          fi
          cat > wrangler.toml <<EOF
          name = "boiler-tube-lifecycle-system"
          compatibility_date = "2026-07-14"
          pages_build_output_dir = "dist"

          [[d1_databases]]
          binding = "DB"
          database_name = "$DB_NAME"
          database_id = "$D1_DATABASE_ID"
          EOF
          npx --yes wrangler@latest pages project create boiler-tube-lifecycle-system --production-branch=main || true
          npx --yes wrangler@latest d1 execute "$DB_NAME" --remote --file=migrations/0001_init.sql

      - name: Publish to Cloudflare Pages
        if: steps.cloudflare.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=boiler-tube-lifecycle-system --branch=${{ github.ref_name }}
