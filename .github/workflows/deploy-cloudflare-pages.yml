name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "炉管全生命周期管理系统.html"
      - "login.html"
      - "assets/**"
      - "functions/**"
      - "migrations/**"
      - "scripts/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "炉管全生命周期管理系统.html" dist/index.html
          cp "login.html" dist/login.html
          cp -R assets dist/assets

      - name: Check Cloudflare secrets
        id: cloudflare
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "::warning::Cloudflare deployment skipped. Configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets, then rerun this workflow."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Cloudflare config and D1
        if: steps.cloudflare.outputs.ready == 'true'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APP_ADMIN_USERNAME: ${{ secrets.APP_ADMIN_USERNAME }}
          APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          DB_NAME="boiler_tube_lifecycle_management_system"
          npx --yes wrangler@latest d1 list --json > d1-list.json
          D1_DATABASE_ID="$(python scripts/resolve_d1_id.py d1-list.json "$DB_NAME")"
          if [[ -z "$D1_DATABASE_ID" ]]; then
            npx --yes wrangler@latest d1 create "$DB_NAME" > d1-create.txt
            D1_DATABASE_ID="$(python scripts/resolve_d1_id.py d1-create.txt "$DB_NAME")"
          fi
          if [[ -z "$D1_DATABASE_ID" ]]; then
            echo "Unable to resolve D1 database id."
            exit 1
          fi
          echo "Using D1 database '$DB_NAME' ($D1_DATABASE_ID)."
          cat > wrangler.toml <<EOF
          name = "boiler-tube-lifecycle-system"
          compatibility_date = "2026-07-14"
          pages_build_output_dir = "dist"

          [[d1_databases]]
          binding = "DB"
          database_name = "$DB_NAME"
          database_id = "$D1_DATABASE_ID"
          EOF
          npx --yes wrangler@latest pages project create boiler-tube-lifecycle-system --production-branch=main || true
          cat > reset-schema.sql <<EOF
          DROP TABLE IF EXISTS sessions;
          DROP TABLE IF EXISTS users;
          DROP TABLE IF EXISTS app_kv;
          EOF
          npx --yes wrangler@latest d1 execute DB --remote --file=reset-schema.sql
          npx --yes wrangler@latest d1 execute DB --remote --file=migrations/0001_init.sql
          if [[ -n "${APP_ADMIN_USERNAME:-}" && -n "${APP_ADMIN_PASSWORD:-}" ]]; then
            python scripts/hash_password_sql.py "$APP_ADMIN_USERNAME" "$APP_ADMIN_PASSWORD" admin > seed-admin.sql
            npx --yes wrangler@latest d1 execute DB --remote --file=seed-admin.sql
            npx --yes wrangler@latest d1 execute DB --remote --command="SELECT COUNT(*) AS admin_user_count FROM users;" --json
          else
            echo "::warning::APP_ADMIN_USERNAME and APP_ADMIN_PASSWORD are not configured. Login will be enabled, but no admin user will be seeded."
          fi

      - name: Publish to Cloudflare Pages
        if: steps.cloudflare.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=boiler-tube-lifecycle-system --branch=${{ github.ref_name }}

      - name: Smoke test deployed login
        if: steps.cloudflare.outputs.ready == 'true'
        shell: bash
        env:
          APP_ADMIN_USERNAME: ${{ secrets.APP_ADMIN_USERNAME }}
          APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          payload="$(python - <<'PY'
import json
import os
print(json.dumps({
    "username": os.environ["APP_ADMIN_USERNAME"],
    "password": os.environ["APP_ADMIN_PASSWORD"],
}))
PY
)"
          status="$(curl -sS -o login-response.json -c login-cookies.txt -w "%{http_code}" \
            -H 'Content-Type: application/json' \
            -d "$payload" \
            https://btgs.wegpt.top/api/auth/login)"
          echo "login_status=$status"
          cat login-response.json
          if [[ "$status" != "200" ]]; then
            echo "::error::Deployed login endpoint rejected the seeded admin credentials."
            exit 1
          fi
          session_status="$(curl -sS -o session-response.json -b login-cookies.txt -w "%{http_code}" \
            https://btgs.wegpt.top/api/auth/session)"
          echo "session_status=$session_status"
          cat session-response.json
          if [[ "$session_status" != "200" ]]; then
            echo "::error::Deployed session endpoint did not accept the login cookie."
            exit 1
          fi
