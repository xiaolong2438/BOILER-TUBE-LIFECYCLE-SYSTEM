<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 | 锅炉受热面全寿命管理系统</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #05070b;
    --panel: #0b131b;
    --panel-2: #111d29;
    --line: rgba(166, 205, 220, 0.18);
    --cyan: #39c7df;
    --green: #19d18b;
    --amber: #ffb545;
    --red: #ff5d6c;
    --text: #edf7fb;
    --muted: #91a8b7;
  }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 26px;
    color: var(--text);
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    background:
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px) 0 0 / 48px 48px,
      linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px) 0 0 / 48px 48px,
      radial-gradient(circle at 14% 18%, rgba(57,199,223,.16), transparent 31%),
      radial-gradient(circle at 86% 72%, rgba(255,181,69,.13), transparent 27%),
      var(--bg);
  }
  .shell {
    width: min(1120px, 100%);
    min-height: 640px;
    display: grid;
    grid-template-columns: minmax(0, 1.35fr) minmax(360px, .85fr);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    background: rgba(8, 14, 20, .86);
    box-shadow: 0 24px 80px rgba(0, 0, 0, .46), 0 0 0 1px rgba(57,199,223,.08);
  }
  .visual {
    position: relative;
    padding: 34px;
    min-height: 640px;
    background:
      linear-gradient(135deg, rgba(16, 28, 38, .94), rgba(6, 10, 14, .82)),
      radial-gradient(circle at 30% 32%, rgba(57,199,223,.16), transparent 35%);
    border-right: 1px solid var(--line);
    overflow: hidden;
  }
  .visual::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(transparent 0 48%, rgba(57,199,223,.08) 49%, transparent 51% 100%);
    background-size: 100% 7px;
    opacity: .32;
    pointer-events: none;
  }
  .brand-row {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-mark {
    width: 50px;
    height: 50px;
    display: grid;
    place-items: center;
    border-radius: 8px;
    border: 1px solid rgba(57,199,223,.72);
    color: var(--cyan);
    font-weight: 800;
    letter-spacing: 1px;
    background: rgba(57,199,223,.08);
    box-shadow: 0 0 24px rgba(57,199,223,.2);
  }
  .brand h1 {
    font-size: 19px;
    letter-spacing: 1.6px;
    font-weight: 700;
  }
  .brand p, .top-status {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    margin-top: 5px;
  }
  .top-status {
    padding: 8px 10px;
    border: 1px solid rgba(25,209,139,.28);
    border-radius: 6px;
    color: #bdf9df;
    background: rgba(25,209,139,.07);
    white-space: nowrap;
  }
  .boiler-map {
    position: relative;
    z-index: 1;
    height: 380px;
    margin: 46px 10px 30px;
    border: 1px solid rgba(166,205,220,.16);
    border-radius: 10px;
    background:
      linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px) 0 0 / 34px 34px,
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px) 0 0 / 34px 34px,
      rgba(4, 9, 13, .58);
    overflow: hidden;
  }
  .duct {
    position: absolute;
    left: 12%;
    top: 19%;
    width: 72%;
    height: 60%;
    border: 3px solid rgba(145,168,183,.34);
    border-bottom-width: 0;
    clip-path: polygon(0 0, 78% 0, 78% 68%, 56% 68%, 56% 100%, 28% 100%, 28% 68%, 0 68%);
  }
  .fire-bed {
    position: absolute;
    left: 13.5%;
    bottom: 18%;
    width: 28%;
    height: 22%;
    border-radius: 0 0 120px 120px;
    background: radial-gradient(circle at 50% 80%, rgba(255,93,108,.48), rgba(255,181,69,.18) 46%, transparent 72%);
  }
  .tube {
    position: absolute;
    width: 18px;
    height: 220px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.22);
    background: linear-gradient(90deg, rgba(255,255,255,.18), transparent 35%, rgba(0,0,0,.35));
    box-shadow: inset 0 0 18px rgba(0,0,0,.44), 0 0 18px var(--glow, rgba(57,199,223,.22));
  }
  .tube::before {
    content: "";
    position: absolute;
    inset: 12px 5px;
    border-radius: 12px;
    border-left: 2px dashed rgba(255,255,255,.2);
  }
  .tube.t1 { left: 20%; top: 16%; background-color: rgba(255,93,108,.72); --glow: rgba(255,93,108,.28); }
  .tube.t2 { left: 31%; top: 12%; background-color: rgba(255,181,69,.72); --glow: rgba(255,181,69,.32); }
  .tube.t3 { left: 44%; top: 15%; background-color: rgba(57,199,223,.72); }
  .tube.t4 { right: 24%; top: 24%; height: 180px; background-color: rgba(25,209,139,.72); --glow: rgba(25,209,139,.24); transform: rotate(90deg); }
  .smoke-line {
    position: absolute;
    left: 24%;
    top: 66%;
    width: 54%;
    height: 3px;
    background: repeating-linear-gradient(90deg, rgba(255,181,69,.85) 0 12px, transparent 12px 23px);
    transform: rotate(-18deg);
    opacity: .78;
  }
  .metric-strip {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .metric {
    min-height: 88px;
    padding: 14px;
    border: 1px solid rgba(166,205,220,.16);
    border-radius: 8px;
    background: rgba(9, 18, 26, .72);
  }
  .metric .k {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .metric .v {
    margin-top: 10px;
    font-size: 24px;
    font-weight: 800;
  }
  .metric .v.green { color: var(--green); }
  .metric .v.amber { color: var(--amber); }
  .metric .v.red { color: var(--red); }
  .login-panel {
    padding: 46px 42px;
    background: linear-gradient(180deg, rgba(17,29,41,.94), rgba(7,11,15,.96));
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .login-panel h2 {
    font-size: 24px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .login-panel .subtitle {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: 28px;
  }
  label {
    display: block;
    color: var(--muted);
    font-size: 12px;
    margin: 17px 0 8px;
    letter-spacing: 1px;
  }
  input {
    width: 100%;
    height: 46px;
    padding: 0 13px;
    border-radius: 7px;
    border: 1px solid rgba(166,205,220,.22);
    background: rgba(2, 6, 10, .78);
    color: var(--text);
    font: inherit;
    outline: none;
  }
  input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(57,199,223,.14);
  }
  button {
    width: 100%;
    height: 46px;
    margin-top: 24px;
    border: 1px solid rgba(57,199,223,.76);
    border-radius: 7px;
    background: linear-gradient(135deg, rgba(57,199,223,.28), rgba(25,209,139,.18));
    color: #fff;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 2px;
  }
  button:hover { box-shadow: 0 0 24px rgba(57,199,223,.2); }
  button:disabled { opacity: .58; cursor: wait; }
  .status {
    min-height: 22px;
    margin-top: 15px;
    color: var(--muted);
    font-size: 13px;
  }
  .status.error { color: var(--red); }
  .status.ok { color: var(--green); }
  .security-note {
    margin-top: 28px;
    display: grid;
    grid-template-columns: 10px 1fr;
    gap: 10px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.7;
  }
  .security-note::before {
    content: "";
    width: 10px;
    height: 10px;
    margin-top: 5px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 12px rgba(25,209,139,.54);
  }
  @media (max-width: 900px) {
    body { padding: 16px; place-items: stretch; }
    .shell { min-height: 100vh; grid-template-columns: 1fr; }
    .visual { min-height: auto; padding: 22px; border-right: none; border-bottom: 1px solid var(--line); }
    .boiler-map { height: 168px; margin: 20px 0 14px; }
    .tube { height: 102px; width: 13px; }
    .tube.t4 { height: 88px; }
    .metric-strip { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .metric { min-height: 68px; padding: 10px; }
    .metric .k { font-size: 9px; }
    .metric .v { font-size: 19px; margin-top: 7px; }
    .login-panel { padding: 30px 24px 36px; }
    .brand-row { align-items: flex-start; flex-direction: column; }
  }
</style>
</head>
<body>
  <main class="shell">
    <section class="visual" aria-label="系统态势">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-mark">BT</div>
          <div>
            <h1>BOILER-TUBE LIFECYCLE SYSTEM</h1>
            <p>锅炉受热面全寿命管理系统</p>
          </div>
        </div>
        <div class="top-status">D1 SESSION READY</div>
      </div>

      <div class="boiler-map" aria-hidden="true">
        <div class="duct"></div>
        <div class="fire-bed"></div>
        <div class="tube t1"></div>
        <div class="tube t2"></div>
        <div class="tube t3"></div>
        <div class="tube t4"></div>
        <div class="smoke-line"></div>
      </div>

      <div class="metric-strip">
        <div class="metric"><div class="k">ACTIVE UNITS</div><div class="v green">1 / 2</div></div>
        <div class="metric"><div class="k">RISK CHANNEL</div><div class="v amber">LIVE</div></div>
        <div class="metric"><div class="k">ACCESS GATE</div><div class="v red">LOCK</div></div>
      </div>
    </section>

    <section class="login-panel">
      <h2>身份认证</h2>
      <p class="subtitle">请输入授权账号进入炉管台账、检修计划、材料库与 D1 云端数据区。</p>
      <form id="login-form">
        <label for="username">账号</label>
        <input id="username" name="username" autocomplete="username" required>
        <label for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button id="submit-btn" type="submit">登录系统</button>
        <div class="status" id="status"></div>
      </form>
      <div class="security-note">登录状态由服务端 Session 校验，台账数据接口与主页面访问会同步受保护。</div>
    </section>
  </main>
<script>
const form = document.getElementById('login-form');
const statusEl = document.getElementById('status');
const submitBtn = document.getElementById('submit-btn');
const usernameInput = document.getElementById('username');

if(window.matchMedia('(min-width: 901px)').matches) usernameInput.focus();

function setStatus(message, type = '') {
  statusEl.textContent = message;
  statusEl.className = `status ${type}`.trim();
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  submitBtn.disabled = true;
  setStatus('正在验证账号...');
  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: form.username.value.trim(),
        password: form.password.value
      })
    });
    const payload = await response.json().catch(() => ({}));
    if(!response.ok) throw new Error(payload.error || '登录失败');
    setStatus('登录成功，正在进入系统...', 'ok');
    const params = new URLSearchParams(location.search);
    location.href = params.get('next') || '/';
  } catch (error) {
    setStatus(error.message || '登录失败', 'error');
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
