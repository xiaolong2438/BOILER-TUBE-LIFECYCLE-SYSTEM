<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 | 锅炉炉管全生命周期管理系统</title>
<link rel="preload" as="image" href="assets/power-station-boiler-bg.webp" type="image/webp" media="(min-width: 901px)" fetchpriority="high">
<link rel="preload" as="image" href="assets/power-station-boiler-bg-mobile.webp" type="image/webp" media="(max-width: 900px)" fetchpriority="high">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --login-bg-image: url("assets/power-station-boiler-bg.png");
    --cyan: #22d9ff;
    --cyan-soft: rgba(34, 217, 255, .22);
    --blue: #147bff;
    --text: #f2fbff;
    --muted: #a6d8f0;
    --panel: rgba(2, 24, 64, .62);
    --line: rgba(34, 217, 255, .42);
    --danger: #ff6b85;
    --ok: #57f0b0;
  }
  @supports (background-image: image-set(url("assets/power-station-boiler-bg.webp") type("image/webp"))) {
    :root {
      --login-bg-image: image-set(
        url("assets/power-station-boiler-bg.webp") type("image/webp"),
        url("assets/power-station-boiler-bg.png") type("image/png")
      );
    }
  }
  body {
    min-height: 100vh;
    overflow: hidden;
    color: var(--text);
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #02091b;
  }
  .page {
    position: relative;
    min-height: 100vh;
    padding: 50px 70px 54px;
    background:
      linear-gradient(90deg, rgba(2, 12, 39, .18) 0%, rgba(0, 24, 73, .08) 52%, rgba(0, 22, 69, .72) 100%),
      linear-gradient(180deg, rgba(0, 10, 30, .05) 0%, rgba(0, 7, 24, .24) 100%),
      var(--login-bg-image) left center / cover no-repeat;
  }
  .page::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px) 0 0 / 42px 42px,
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px) 0 0 / 42px 42px;
    mask-image: linear-gradient(90deg, black 0%, black 72%, transparent 100%);
    pointer-events: none;
  }
  .page::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 52% 66%, rgba(34,217,255,.2), transparent 24%);
    pointer-events: none;
  }
  .content {
    position: relative;
    z-index: 1;
    min-height: calc(100vh - 104px);
    display: grid;
    grid-template-columns: minmax(620px, 1fr) 500px;
    gap: 48px;
    align-items: center;
  }
  .hero {
    align-self: stretch;
    display: flex;
    flex-direction: column;
  }
  .title-block {
    margin-top: 2px;
    text-shadow: 0 6px 28px rgba(0, 0, 0, .36);
  }
  .title-block h1 {
    font-size: clamp(42px, 4vw, 70px);
    line-height: 1.05;
    letter-spacing: 3px;
    font-weight: 900;
  }
  .title-block .en {
    margin-top: 12px;
    color: #c5ecff;
    font-size: clamp(17px, 1.45vw, 26px);
    letter-spacing: 1.5px;
    font-weight: 600;
  }
  .title-line {
    width: 82px;
    height: 4px;
    margin-top: 18px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--cyan), transparent);
    box-shadow: 0 0 16px rgba(34,217,255,.85);
  }
  .bottom-tags {
    margin-top: auto;
    display: none;
    gap: 34px;
    align-items: flex-end;
    padding-left: 90px;
  }
  .tag {
    min-width: 104px;
    text-align: center;
    color: #f4fbff;
    font-size: 15px;
    font-weight: 700;
    text-shadow: 0 4px 16px rgba(0, 0, 0, .38);
  }
  .tag-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 10px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    border: 2px solid rgba(34,217,255,.72);
    color: var(--cyan);
    font-size: 25px;
    background: rgba(0, 60, 130, .22);
    box-shadow: inset 0 0 18px rgba(34,217,255,.13), 0 0 22px rgba(34,217,255,.28);
  }
  .login-card {
    width: 100%;
    min-height: 560px;
    padding: 66px 62px 52px;
    border: 1px solid rgba(34,217,255,.74);
    border-radius: 16px;
    background:
      linear-gradient(145deg, rgba(10, 57, 127, .58), rgba(1, 24, 77, .74)),
      radial-gradient(circle at 18% 0%, rgba(34,217,255,.22), transparent 34%);
    box-shadow:
      0 0 0 1px rgba(34,217,255,.12),
      0 0 38px rgba(34,217,255,.38),
      inset 0 0 42px rgba(19, 93, 199, .22);
    backdrop-filter: blur(10px);
  }
  .login-card h2 {
    text-align: center;
    font-size: 31px;
    letter-spacing: 1.5px;
    font-weight: 900;
    text-shadow: 0 0 18px rgba(34,217,255,.28);
  }
  .login-subtitle {
    margin: 28px 0 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    color: #8eeaff;
    font-size: 22px;
    letter-spacing: 3px;
    font-weight: 700;
  }
  .login-subtitle::before,
  .login-subtitle::after {
    content: "";
    width: 72px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan));
  }
  .login-subtitle::after {
    background: linear-gradient(90deg, var(--cyan), transparent);
  }
  .field {
    position: relative;
    margin-bottom: 22px;
  }
  .field span {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #7fe8ff;
    font-size: 22px;
  }
  input {
    width: 100%;
    height: 58px;
    padding: 0 18px 0 58px;
    border: 1px solid rgba(126, 222, 255, .36);
    border-radius: 6px;
    background: rgba(0, 31, 92, .36);
    color: var(--text);
    font: inherit;
    font-size: 16px;
    outline: none;
  }
  input::placeholder { color: rgba(198,232,250,.62); }
  input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(34,217,255,.12), 0 0 18px rgba(34,217,255,.22);
  }
  .options {
    margin: 4px 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #b8dff4;
    font-size: 14px;
  }
  .remember {
    display: inline-flex;
    align-items: center;
    gap: 9px;
  }
  .remember input {
    width: 18px;
    height: 18px;
    padding: 0;
    accent-color: var(--cyan);
  }
  .options a {
    color: #a9d9f4;
    text-decoration: none;
  }
  button {
    width: 100%;
    height: 58px;
    border: none;
    border-radius: 6px;
    background: linear-gradient(90deg, #1fd5ff, #147bff);
    color: white;
    font: inherit;
    font-size: 21px;
    font-weight: 800;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 16px 28px rgba(0, 86, 199, .28), inset 0 0 12px rgba(255,255,255,.16);
  }
  button:hover {
    filter: brightness(1.08);
    box-shadow: 0 18px 34px rgba(0, 113, 255, .34), 0 0 22px rgba(34,217,255,.3);
  }
  button:disabled {
    opacity: .6;
    cursor: wait;
  }
  .status {
    min-height: 22px;
    margin-top: 16px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  .status.error { color: var(--danger); }
  .status.ok { color: var(--ok); }
  @media (max-width: 1200px) {
    .page { padding: 36px 34px; }
    .content { grid-template-columns: 1fr 440px; gap: 30px; }
    .bottom-tags { padding-left: 20px; gap: 18px; }
    .login-card { padding: 54px 44px 42px; }
  }
  @media (max-width: 900px) {
    @supports (background-image: image-set(url("assets/power-station-boiler-bg-mobile.webp") type("image/webp"))) {
      :root {
        --login-bg-image: image-set(
          url("assets/power-station-boiler-bg-mobile.webp") type("image/webp"),
          url("assets/power-station-boiler-bg.png") type("image/png")
        );
      }
    }
    body { overflow: auto; }
    .page {
      min-height: 100vh;
      padding: 24px 16px;
      background-position: 34% center;
    }
    .content {
      min-height: auto;
      grid-template-columns: 1fr;
      gap: 26px;
    }
    .title-block h1 { font-size: 34px; }
    .title-block .en { font-size: 14px; }
    .bottom-tags {
      display: none;
    }
    .login-card {
      min-height: auto;
      padding: 34px 24px 28px;
      border-radius: 14px;
    }
    .login-card h2 { font-size: 24px; }
    .login-subtitle { font-size: 17px; margin: 20px 0 24px; }
    .login-subtitle::before,
    .login-subtitle::after { width: 44px; }
  }
</style>
</head>
<body>
  <main class="page">
    <div class="content">
      <section class="hero" aria-label="系统介绍">
        <div class="title-block">
          <h1>锅炉炉管全生命周期管理系统</h1>
          <div class="en">BOILER-TUBE LIFE CYCLE MANAGEMENT SYSTEM</div>
          <div class="title-line"></div>
        </div>

        <div class="bottom-tags" aria-label="系统能力">
          <div class="tag"><div class="tag-icon">▤</div>数据驱动</div>
          <div class="tag"><div class="tag-icon">◎</div>智能分析</div>
          <div class="tag"><div class="tag-icon">盾</div>安全可控</div>
          <div class="tag"><div class="tag-icon">⚒</div>高效运维</div>
        </div>
      </section>

      <section class="login-card" aria-label="用户登录">
        <h2>锅炉炉管全生命周期管理系统</h2>
        <div class="login-subtitle">用户登录</div>
        <form id="login-form">
          <div class="field">
            <span>●</span>
            <input id="username" name="username" autocomplete="username" placeholder="请输入用户名" required>
          </div>
          <div class="field">
            <span>▣</span>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required>
          </div>
          <div class="options">
            <label class="remember"><input id="remember" type="checkbox">记住密码</label>
            <a href="javascript:void(0)" onclick="setStatus('请联系系统管理员重置密码。')">忘记密码?</a>
          </div>
          <button id="submit-btn" type="submit">登录</button>
          <div class="status" id="status"></div>
        </form>
      </section>
    </div>
  </main>
<script>
const form = document.getElementById('login-form');
const statusEl = document.getElementById('status');
const submitBtn = document.getElementById('submit-btn');
const usernameInput = document.getElementById('username');
const rememberInput = document.getElementById('remember');

const rememberedUsername = localStorage.getItem('bt_login_username') || '';
if(rememberedUsername) {
  usernameInput.value = rememberedUsername;
  rememberInput.checked = true;
}
if(window.matchMedia('(min-width: 901px)').matches) usernameInput.focus();

function setStatus(message, type = '') {
  statusEl.textContent = message;
  statusEl.className = `status ${type}`.trim();
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  submitBtn.disabled = true;
  setStatus('正在验证账号...');
  try {
    const username = form.username.value.trim();
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username,
        password: form.password.value.trim()
      })
    });
    const payload = await response.json().catch(() => ({}));
    if(!response.ok) throw new Error(payload.error || '登录失败');
    if(rememberInput.checked) localStorage.setItem('bt_login_username', username);
    else localStorage.removeItem('bt_login_username');
    setStatus('登录成功，正在进入系统...', 'ok');
    const params = new URLSearchParams(location.search);
    location.href = params.get('next') || '/';
  } catch (error) {
    setStatus(error.message || '登录失败', 'error');
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
